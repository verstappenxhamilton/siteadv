<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Painel Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/themes.css" />
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="Administração do atendimento jurídico" />
  <meta name="theme-color" content="#0B1220" id="themeColor">
  <style>
    /* Ajustes mínimos de layout específicos do Admin sem alterar fluxos */
    .admin-header { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .admin-title { font-weight:700; font-size:28px; line-height:36px; margin:0; }
    .admin-section { margin-top:14px; }
  </style>
  <!-- Tema padrão aplicado via classe no body: tema A (Minimal Light) -->
  <!-- Para alternar tema manualmente: troque para theme-b, theme-c ou theme-d no body -->
</head>
<body class="theme-d">
  <div class="container" style="padding-top:16px; padding-bottom:24px;">
    <div class="admin-header">
      <h1 class="admin-title">Painel Administrativo</h1>
    </div>

    <div class="panel admin-section">
      <form id="configForm" class="form-grid">
        <label>Provedor
          <select name="provider">
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
            <option value="groq">Groq</option>
            <option value="gemini">Gemini</option>
          </select>
        </label>
        <label>Modelo <input type="text" name="model" /></label>
        <label>Max tokens <input type="number" name="max_output_tokens" /></label>
        <label>Temperature <input type="number" step="0.1" name="temperature" /></label>
        <label>Top P <input type="number" step="0.1" name="top_p" /></label>
        <label>Prompt<br/>
          <textarea name="prompt" rows="4" cols="40"></textarea>
        </label>
        <button type="submit" class="primary">Salvar</button>
      </form>
    </div>

    <div class="panel admin-section">
      <form id="keyForm" class="form-grid">
        <h2 style="margin:0 0 8px 0;">API Keys</h2>
        <label>OpenAI <input type="password" name="openai" /></label>
        <label>Anthropic <input type="password" name="anthropic" /></label>
        <label>Groq <input type="password" name="groq" /></label>
        <label>Gemini <input type="password" name="gemini" /></label>
        <button type="submit" class="secondary">Salvar chaves</button>
      </form>
    </div>
  </div>
  <script src="/admin.js"></script>
</body>
</html>
