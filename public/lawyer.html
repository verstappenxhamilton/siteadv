<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Painel do Advogado</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="#22c55e" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L1 21h22L12 2zm0 3.84L19.53 19H4.47L12 5.84zM11 10v5h2v-5h-2zm0 6v2h2v-2h-2z"/></svg>
        <div>
          <div style="font-weight:700;">Painel do Advogado</div>
          <div class="badge online">Você está online</div>
        </div>
      </div>
      <div class="actions">
        <a class="secondary" href="/" title="Página do Cliente">Página do Cliente</a>
      </div>
    </div>

    <div class="panel" style="margin-top:14px;">
      <div style="margin-bottom:12px; color: var(--muted);">Deixe esta página aberta para receber chamadas.</div>
      <div class="videos">
        <div class="video-box">
          <video id="remoteVideo" playsinline autoplay></video>
          <div class="muted-note">Cliente</div>
        </div>
        <div class="video-box">
          <video id="localVideo" playsinline autoplay muted></video>
          <div class="muted-note">Você (mudo)</div>
        </div>
      </div>
      <div class="actions" style="margin-top:12px;">
        <button id="hangupBtn" class="danger" disabled>Encerrar chamada</button>
        <button id="testBtn" class="secondary">Testar câmera/microfone</button>
      </div>
      <div class="chat-box" style="margin-top:12px;">
        <div id="chatMessages" class="chat-messages"></div>
        <form id="chatForm" class="chat-form">
          <input id="chatInput" type="text" placeholder="Digite sua mensagem" required>
          <button class="primary" type="submit">Enviar</button>
        </form>
      </div>
      <div id="info" class="footer">Aguardando chamadas...</div>
    </div>
  </div>

  <div class="incoming" id="incoming">
    <div class="modal">
      <div style="font-weight:700; margin-bottom:6px;">Chamada recebida</div>
      <div style="color: var(--muted); margin-bottom:12px;">Um cliente está ligando agora.</div>
      <div class="actions">
        <button id="acceptBtn" class="primary">Atender</button>
        <button id="rejectBtn" class="secondary">Recusar</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/lawyer.js"></script>
</body>
</html>
